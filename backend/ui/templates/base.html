<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Виявлення аномалій{% endblock %}</title>

    <!-- Tailwind CSS v4 -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>

    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <!-- Custom styles -->
    <link rel="stylesheet" href="/static/styles.css">

    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Navigation -->
    <nav class="bg-slate-800 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="/" class="text-xl font-bold hover:text-blue-200 transition-colors">🔍 Виявлення Аномалій</a>
                <ul class="flex space-x-1">
                    <li><a href="/" class="px-4 py-2 rounded-lg hover:bg-slate-700 transition-colors {% if active_page == 'dashboard' %}bg-slate-700{% endif %}">Головна</a></li>
                    <li><a href="/heatmap" class="px-4 py-2 rounded-lg hover:bg-slate-700 transition-colors {% if active_page == 'heatmap' %}bg-slate-700{% endif %}">Теплова карта</a></li>
                    <li><a href="/table" class="px-4 py-2 rounded-lg hover:bg-slate-700 transition-colors {% if active_page == 'table' %}bg-slate-700{% endif %}">Таблиця</a></li>
                    <li><a href="/sources" class="px-4 py-2 rounded-lg hover:bg-slate-700 transition-colors {% if active_page == 'sources' %}bg-slate-700{% endif %}">Джерела</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-slate-800 text-white mt-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 text-center">
            <p class="text-sm text-gray-300">Сервіс виявлення фінансових аномалій &copy; 2026</p>
        </div>
    </footer>

    <!-- Chart.js initialization -->
    <script src="/static/chart.js"></script>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
